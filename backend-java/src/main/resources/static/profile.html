<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - BikeSparePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0a0f1d] text-slate-100 flex flex-col min-h-screen">

    <header class="border-b border-slate-800/80 bg-[#0a0f1d]/90 backdrop-blur-md sticky top-0 z-40"></header>

    <main class="flex-grow max-w-6xl mx-auto px-4 py-12 w-full grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Profile Column -->
        <div class="md:col-span-1 space-y-6">
            <div class="glass-panel p-6 rounded-2xl border border-slate-800 space-y-6">
                <h3 class="text-lg font-bold text-white border-b border-slate-850 pb-3">My Details</h3>
                
                <form id="profile-form" onsubmit="handleUpdateProfile(event)" class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] text-slate-450 font-bold uppercase tracking-wider">Email Address</label>
                        <input type="text" id="prof-email" readonly class="w-full px-3 py-2 bg-slate-950 border border-slate-900 rounded-xl text-slate-500 text-sm focus:outline-none cursor-not-allowed">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] text-slate-450 font-bold uppercase tracking-wider">Full Name</label>
                        <input type="text" id="prof-name" required class="w-full px-3 py-2 bg-slate-900 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-amber-500">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] text-slate-450 font-bold uppercase tracking-wider">Phone Number</label>
                        <input type="text" id="prof-phone" class="w-full px-3 py-2 bg-slate-900 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-amber-500">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] text-slate-450 font-bold uppercase tracking-wider">Default Shipping Address</label>
                        <textarea id="prof-address" rows="3" class="w-full px-3 py-2 bg-slate-900 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-amber-500"></textarea>
                    </div>
                    
                    <button type="submit" class="w-full py-2.5 bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold rounded-xl text-xs transition-smooth">
                        Update Settings
                    </button>
                </form>
            </div>
        </div>

        <!-- Orders Column -->
        <div class="md:col-span-2 space-y-6">
            <div class="glass-panel p-6 rounded-2xl border border-slate-800 space-y-6">
                <h3 class="text-lg font-bold text-white border-b border-slate-850 pb-3 flex justify-between items-center">
                    <span>Order History</span>
                    <span id="order-count" class="text-xs px-2 py-0.5 bg-slate-800 text-slate-400 rounded-full">0 Orders</span>
                </h3>

                <div id="orders-list" class="space-y-4">
                    <!-- Dynamic Orders List -->
                    <div class="text-center py-12 text-slate-500">Loading order history...</div>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-slate-950"></footer>

    <script src="js/app.js"></script>
    <script>
        // Redirect if not logged in
        if (!getUser()) {
            window.location.href = 'auth.html';
        }

        async function initProfile() {
            // Load user data
            const res = await fetchAPI('/api/auth/profile');
            if (res.success && res.user) {
                const u = res.user;
                document.getElementById('prof-email').value = u.email;
                document.getElementById('prof-name').value = u.name;
                document.getElementById('prof-phone').value = u.phone || '';
                document.getElementById('prof-address').value = u.address || '';
                // Sync localStorage just in case
                setUser(u);
            }

            // Load order history
            loadOrders();
        }

        async function loadOrders() {
            const data = await fetchAPI('/api/orders/my-orders');
            const list = document.getElementById('orders-list');
            const countBadge = document.getElementById('order-count');

            if (data.success && data.orders) {
                countBadge.innerText = `${data.orders.length} Orders`;
                if (data.orders.length === 0) {
                    list.innerHTML = '<div class="text-center py-12 text-slate-500">No orders placed yet.</div>';
                    return;
                }

                list.innerHTML = data.orders.map(order => {
                    const dateStr = new Date(order.createdAt).toLocaleDateString('en-IN', {
                        day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });

                    const statusColors = {
                        pending: 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20',
                        paid: 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20',
                        shipped: 'bg-blue-500/10 text-blue-400 border-blue-500/20',
                        delivered: 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20',
                        cancelled: 'bg-red-500/10 text-red-400 border-red-500/20'
                    };

                    const orderItemsHtml = order.orderItems.map(item => `
                        <div class="flex justify-between items-center text-xs py-1 border-b border-slate-900/50">
                            <span class="text-slate-300 font-medium">${item.product.name} <span class="text-slate-500">x${item.quantity}</span></span>
                            <span class="text-slate-400">Rs. ${item.price}</span>
                        </div>
                    `).join('');

                    return `
                        <div class="border border-slate-850 bg-slate-950/20 rounded-xl p-5 space-y-4">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-850 pb-3 gap-2">
                                <div>
                                    <span class="text-[10px] text-slate-500 uppercase tracking-wider">Order ID</span>
                                    <h4 class="text-white font-extrabold text-sm">#${order.id}</h4>
                                </div>
                                <div class="text-left sm:text-right">
                                    <span class="text-[10px] text-slate-500 uppercase tracking-wider block">Order Placed</span>
                                    <span class="text-slate-300 text-xs">${dateStr}</span>
                                </div>
                                <span class="px-2.5 py-0.5 border rounded-full text-xs font-bold ${statusColors[order.status] || 'bg-slate-800 text-slate-400'}">
                                    ${order.status.toUpperCase()}
                                </span>
                            </div>

                            <div class="space-y-1">
                                <span class="text-[10px] text-slate-500 uppercase tracking-wider block">Items Summary</span>
                                ${orderItemsHtml}
                            </div>

                            <div class="flex justify-between items-center pt-2">
                                <div>
                                    <span class="text-[10px] text-slate-500 uppercase tracking-wider block">Payment ID</span>
                                    <code class="text-xs text-slate-400">${order.paymentId || 'None'}</code>
                                </div>
                                <div class="text-right">
                                    <span class="text-[10px] text-amber-500/80 font-bold uppercase tracking-wider block">Total Amount</span>
                                    <span class="text-white font-extrabold">Rs. ${order.totalAmount}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                list.innerHTML = '<div class="text-center py-12 text-red-400">Failed to load order history.</div>';
            }
        }

        async function handleUpdateProfile(e) {
            e.preventDefault();
            const name = document.getElementById('prof-name').value;
            const phone = document.getElementById('prof-phone').value;
            const address = document.getElementById('prof-address').value;

            const res = await fetchAPI('/api/auth/profile', {
                method: 'PUT',
                body: JSON.stringify({ name, phone, address })
            });

            if (res.success && res.user) {
                setUser(res.user);
                showToast('Profile settings updated successfully!', 'success');
                // Reload navbar to sync username name
                renderNavbar();
            } else {
                showToast(res.message || 'Failed to update settings', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', initProfile);
    </script>
</body>
</html>
