<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - BikeSparePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0a0f1d] text-slate-100 flex flex-col min-h-screen">

    <header class="border-b border-slate-800/80 bg-[#0a0f1d]/90 backdrop-blur-md sticky top-0 z-40"></header>

    <main class="flex-grow flex items-center justify-center py-16 px-4">
        <div class="w-full max-w-md glass-panel p-8 rounded-3xl border border-slate-800 space-y-6">
            <!-- Tabs Header -->
            <div class="flex border-b border-slate-850">
                <button id="tab-login" onclick="switchTab('login')" class="flex-1 pb-4 text-center font-bold border-b-2 border-amber-500 text-white transition-smooth">
                    Sign In
                </button>
                <button id="tab-register" onclick="switchTab('register')" class="flex-1 pb-4 text-center font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-smooth">
                    Register
                </button>
            </div>

            <!-- Login Form -->
            <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Email Address</label>
                    <input type="email" id="login-email" required class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-amber-500 text-sm">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Password</label>
                    <input type="password" id="login-password" required class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-amber-500 text-sm">
                </div>
                <button type="submit" class="w-full py-3.5 bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold rounded-xl text-sm transition-smooth mt-6">
                    Sign In to Account
                </button>
            </form>

            <!-- Register Form -->
            <form id="form-register" onsubmit="handleRegister(event)" class="space-y-4 hidden">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Full Name</label>
                    <input type="text" id="reg-name" required class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-amber-500 text-sm">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Email Address</label>
                    <input type="email" id="reg-email" required class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-amber-500 text-sm">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Password</label>
                    <input type="password" id="reg-password" required minlength="6" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-amber-500 text-sm">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Phone Number (Optional)</label>
                    <input type="text" id="reg-phone" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-amber-500 text-sm">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Shipping Address (Optional)</label>
                    <textarea id="reg-address" rows="2" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-amber-500 text-sm"></textarea>
                </div>
                <button type="submit" class="w-full py-3.5 bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold rounded-xl text-sm transition-smooth mt-6">
                    Create Free Account
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-slate-950"></footer>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (getUser()) {
            window.location.href = 'index.html';
        }

        function switchTab(tab) {
            const loginBtn = document.getElementById('tab-login');
            const regBtn = document.getElementById('tab-register');
            const loginForm = document.getElementById('form-login');
            const regForm = document.getElementById('form-register');

            if (tab === 'login') {
                loginBtn.className = "flex-1 pb-4 text-center font-bold border-b-2 border-amber-500 text-white transition-smooth";
                regBtn.className = "flex-1 pb-4 text-center font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-smooth";
                loginForm.classList.remove('hidden');
                regForm.classList.add('hidden');
            } else {
                regBtn.className = "flex-1 pb-4 text-center font-bold border-b-2 border-amber-500 text-white transition-smooth";
                loginBtn.className = "flex-1 pb-4 text-center font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-smooth";
                regForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const res = await fetchAPI('/api/auth/login', {
                method: 'POST',
                body: JSON.stringify({ email, password })
            });

            if (res.success && res.token) {
                setAuthToken(res.token);
                setUser(res.user);
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                showToast(res.message || 'Login failed. Please check credentials.', 'error');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const phone = document.getElementById('reg-phone').value;
            const address = document.getElementById('reg-address').value;

            const res = await fetchAPI('/api/auth/register', {
                method: 'POST',
                body: JSON.stringify({ name, email, password, phone, address })
            });

            if (res.success && res.token) {
                setAuthToken(res.token);
                setUser(res.user);
                showToast('Registration successful! Welcome aboard.', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                showToast(res.message || 'Registration failed. Try a different email.', 'error');
            }
        }
    </script>
</body>
</html>
